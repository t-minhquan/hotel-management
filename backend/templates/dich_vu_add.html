{% extends "base.html" %}

{% block title %}Thêm Dịch vụ Mới{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
        <i class="bi bi-plus-circle-fill me-2" style="color: #ce9d4d;"></i>Thêm Dịch vụ Mới
    </h4>
    <a href="{{ url_for('danh_sach_dich_vu') }}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
        <i class="bi bi-arrow-left me-1"></i> Quay lại
    </a>
</div>

<div class="bg-white p-4 p-md-5 rounded-4 border shadow-sm mx-auto" style="max-width: 600px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted small">Tên dịch vụ <span class="text-danger">*</span></label>
            <input type="text" name="ten_dv" class="form-control" placeholder="Ví dụ: Massage VIP" required autofocus>
        </div>
        
        <div class="mb-3">
            <label class="form-label fw-semibold text-muted small">Đơn giá (VNĐ) <span class="text-danger">*</span></label>
            <input type="number" name="don_gia" class="form-control" placeholder="Ví dụ: 500000" min="0" step="1000" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label fw-semibold text-muted small">Mô tả chi tiết</label>
            <textarea name="mo_ta" class="form-control" rows="3" placeholder="Nhập mô tả về dịch vụ..."></textarea>
        </div>
        
        <hr class="text-muted mb-4 opacity-25">

        <div class="d-flex justify-content-end gap-3">
            <a href="{{ url_for('danh_sach_dich_vu') }}" class="btn btn-light border px-4 py-2 rounded-pill fw-medium text-muted">
                Hủy bỏ
            </a>
            <button type="submit" class="btn btn-custom px-4 py-2 rounded-pill shadow-sm">
                <i class="bi bi-floppy-fill me-2"></i>Lưu thông tin
            </button>
        </div>
    </form>
</div>
{% endblock %}
