{% extends "base.html" %}

{% block title %}Thêm khách hàng{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">
        <i class="bi bi-person-plus-fill me-2" style="color: #ce9d4d;"></i>Thêm khách hàng mới
    </h4>
    <a href="{{ url_for('danh_sach_khach_hang') }}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
        <i class="bi bi-arrow-left me-1"></i> Quay lại
    </a>
</div>

<div class="bg-white p-4 p-md-5 rounded-4 border shadow-sm mx-auto" style="max-width: 800px;">
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold text-muted small">Họ tên <span class="text-danger">*</span></label>
                <input type="text" name="hoten" class="form-control" placeholder="Nhập họ và tên" required autofocus>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold text-muted small">CCCD <span class="text-danger">*</span></label>
                <input type="text" name="cccd" class="form-control" placeholder="Số Căn cước công dân" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold text-muted small">Số điện thoại <span class="text-danger">*</span></label>
                <input type="text" name="sdt" class="form-control" placeholder="Nhập số điện thoại" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold text-muted small">Email</label>
                <input type="email" name="email" class="form-control" placeholder="example@email.com">
            </div>
            
            <div class="col-12 mb-4">
                <label class="form-label fw-semibold text-muted small">Địa chỉ</label>
                <input type="text" name="diachi" class="form-control" placeholder="Nhập địa chỉ đầy đủ">
            </div>
        </div>
        
        <hr class="text-muted mb-4 opacity-25">

        <div class="d-flex justify-content-end gap-3">
            <a href="{{ url_for('danh_sach_khach_hang') }}" class="btn btn-light border px-4 py-2 rounded-pill fw-medium text-muted">
                Hủy bỏ
            </a>
            <button type="submit" class="btn btn-custom px-4 py-2 rounded-pill shadow-sm">
                <i class="bi bi-floppy-fill me-2"></i>Lưu thông tin
            </button>
        </div>
    </form>
</div>
{% endblock %}
